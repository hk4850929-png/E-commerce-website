<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase | Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-container">

    <div class="login-left">

        <div class="logo">
            <i class="fa-solid fa-bag-shopping"></i>
            <h2>ShopEase</h2>
        </div>

        <h1>Welcome Back 👋</h1>

        <p>
            Login to continue shopping with exclusive offers,
            fast checkout and premium collections.
        </p>

        <img src="https://images.unsplash.com/photo-1607083206968-13611e3d76db?w=900"
             alt="Shopping">
    </div>

    <div class="login-right">

        <form id="loginForm">

            <h2>Login</h2>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required
                >
            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <i
                    class="fa-solid fa-eye togglePassword"
                    id="togglePassword">
                </i>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            <button type="submit" class="login-btn">

                Login

            </button>

            <div class="divider">
                OR
            </div>

            <button type="button" class="google-btn">

                <i class="fa-brands fa-google"></i>

                Continue with Google

            </button>

            <p class="signup">

                Don't have an account?

                <a href="#">Sign Up</a>

            </p>

            <a href="index.html" class="back-home">

                ← Back to Shop

            </a>

        </form>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
